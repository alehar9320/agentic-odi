name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          uv pip install -r requirements.txt

      - name: Run Ruff Lint (no formatting)
        # Lint Python files without changing them
        run: uv run ruff check .

      - name: Verify Ruff Formatting (no auto-fix)
        # Verify formatting only; run `uv run ruff format .` locally to fix before pushing
        run: uv run ruff format --check .

      - name: Run Mypy
        run: uv run mypy .

      - name: Run Bandit
        run: uv run bandit -r .

      - name: Run Tests
        run: uv run python -m pytest tests/ -v
